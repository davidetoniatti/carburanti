<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title data-i18n="title">Fuel Prices</title>
<link rel="manifest" href="/manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#ffffff">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="app">
    <!-- Top Bar -->
    <header id="topbar">
      <div id="logo-container">
        <div id="logo">
          <span class="logo-text">OHMY<em>PIENO</em></span>
        </div>
        <span class="beta-tag">BETA</span>
      </div>

      <div id="controls-container">
        <div class="search-wrap">
          <input type="text" id="addressSearch" data-i18n-placeholder="search_placeholder" placeholder="City or address..." autocomplete="off">
          <div id="searchSuggestions" class="suggestions-dropdown hidden"></div>
          <button id="searchBtn" aria-label="Search">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
          </button>
        </div>

        <div id="controls" class="mobile-hidden">
          <div class="select-wrap">
            <select id="fuelSelect">
              <option value="" data-i18n="loading">Loading...</option>
            </select>
          </div>
          <div class="select-wrap">
            <select id="radiusSelect">
              <option value="2">2 km</option>
              <option value="5" selected>5 km</option>
              <option value="10">10 km</option>
              <option value="20">20 km</option>
            </select>
          </div>
          <div class="select-wrap">
            <select id="langSelect">
              <option value="en">EN</option>
              <option value="it">IT</option>
            </select>
          </div>
          <div class="sheet-handle top-sheet-handle"></div>
        </div>

        <div id="action-buttons">
          <button id="themeToggle" type="button" aria-label="Toggle theme">
            <svg class="sun-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
            <svg class="moon-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          </button>

          <button id="filterToggle" aria-label="Toggle filters">            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 3H2l8 9.46V19l4 2v-8.54L22 3z"/></svg>
          </button>

          <button id="historyToggle" class="history-btn" aria-label="Show history">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 8v4l3 3"/><circle cx="12" cy="12" r="9"/></svg>
          </button>
        </div>
      </div>
    </header>

    <div class="beta-ribbon"><span>BETA</span></div>

    <!-- Map -->
    <div id="map-container">
      <div id="map"></div>
      <button id="searchHereBtn" class="hidden" data-i18n="search_here">Search this area</button>
      <button id="locateBtn" data-i18n-title="locate_title" title="Use my position">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/><circle cx="12" cy="12" r="8" stroke-dasharray="2 4"/></svg>
      </button>
    </div>

    <!-- Detail Panel -->
    <div id="panel" class="hidden">
      <div class="sheet-header">
        <div class="sheet-handle"></div>
      </div>
      <div id="panelContent" class="scrollable-content">
        <div class="panel-loading">
          <div class="spinner"></div>
          <p data-i18n="loading_details">Loading details...</p>
        </div>
      </div>
    </div>

    <!-- History Panel -->
    <div id="historyPanel" class="hidden">
      <div class="sheet-header">
        <div class="sheet-handle"></div>
      </div>
      <div id="historyPanelContent" class="scrollable-content">
        <div class="section-title" data-i18n="recent_title">RECENT STATIONS</div>
        <ul id="historyList"></ul>
      </div>
    </div>

    <!-- Legend -->
    <div id="legend">
      <div class="legend-title" data-i18n="price_legend">PRICE EUR/L</div>
      <div class="legend-scale">
        <span class="legend-label" data-i18n="price_low">low</span>
        <div class="legend-gradient"></div>
        <span class="legend-label" data-i18n="price_high">high</span>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script type="module" src="js/app.js"></script>
  </body>
</html>
